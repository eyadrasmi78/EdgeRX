name: edgerx

networks:
  edgerx:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  backend_storage:
  backend_vendor:

services:
  postgres:
    image: postgres:16-alpine
    container_name: edgerx-postgres
    environment:
      POSTGRES_DB: edgerx
      POSTGRES_USER: edgerx
      POSTGRES_PASSWORD: edgerx
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgerx -d edgerx"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [edgerx]

  redis:
    image: redis:7-alpine
    container_name: edgerx-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [edgerx]

  mailpit:
    image: axllent/mailpit:latest
    container_name: edgerx-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks: [edgerx]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: edgerx-backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [edgerx]
    command: >
      sh -c "
      composer install --no-interaction --optimize-autoloader &&
      php artisan migrate --force &&
      php artisan db:seed --force --class=DemoDataSeeder || true &&
      php artisan storage:link || true &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: edgerx-queue
    env_file: ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks: [edgerx]
    command: php artisan queue:work --tries=3 --max-time=3600 --sleep=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: edgerx-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=/api
    networks: [edgerx]
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0 --port 3000"

  proxy:
    image: nginx:1.27-alpine
    container_name: edgerx-proxy
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks: [edgerx]
